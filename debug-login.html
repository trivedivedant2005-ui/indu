<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Login</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 300px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 10px 5px; }
        .result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Debug Login Test</h1>
    
    <div>
        <h3>Admin Login</h3>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="adminEmail" value="trivedivedant2005@gmail.com">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="adminPassword" value="A124@lok.">
        </div>
        <button onclick="testAdminLogin()">Test Admin Login</button>
    </div>
    
    <div>
        <h3>Student Login</h3>
        <div class="form-group">
            <label>Roll Number:</label>
            <input type="text" id="studentRoll" value="CA01">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="studentPassword" value="password123">
        </div>
        <button onclick="testStudentLogin()">Test Student Login</button>
    </div>
    
    <div id="result" class="result"></div>

    <script>
        async function testAdminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = 'Testing admin login...';
            resultDiv.className = 'result';
            
            console.log('=== ADMIN LOGIN TEST ===');
            console.log('Email:', email);
            console.log('Password:', password);
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/auth/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (data.success) {
                    resultDiv.innerHTML = `<div class="success">✅ Admin Login Successful!<br>Name: ${data.admin.name}<br>Role: ${data.admin.role}<br>Token: ${data.token.substring(0, 50)}...</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Admin Login Failed: ${data.message}</div>`;
                }
            } catch (error) {
                console.error('Admin login error:', error);
                resultDiv.innerHTML = `<div class="error">❌ Network Error: ${error.message}</div>`;
            }
        }
        
        async function testStudentLogin() {
            const roll_number = document.getElementById('studentRoll').value;
            const password = document.getElementById('studentPassword').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = 'Testing student login...';
            resultDiv.className = 'result';
            
            console.log('=== STUDENT LOGIN TEST ===');
            console.log('Roll Number:', roll_number);
            console.log('Password:', password);
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ roll_number, password })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (data.success) {
                    resultDiv.innerHTML = `<div class="success">✅ Student Login Successful!<br>Name: ${data.student.name}<br>Roll: ${data.student.roll_number}<br>Token: ${data.token.substring(0, 50)}...</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Student Login Failed: ${data.message}</div>`;
                }
            } catch (error) {
                console.error('Student login error:', error);
                resultDiv.innerHTML = `<div class="error">❌ Network Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
